<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140" width="100%" height="100%">
  <!-- Symbol: Triangular Diamond / Grape Grid (High Fidelity Reconstitution) -->
  <g transform="translate(0, 5)">
    <!-- Small open V shape at the very top -->
    <path d="M 94,10 L 100,16 L 106,10" fill="none" stroke="#fcfbf9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Downward Pointing Triangle Outline -->
    <polygon points="75,25 125,25 100,60" fill="none" stroke="#fcfbf9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Diagonals going down-right (parallel to left edge) -->
    <path d="M 87.5,25 L 106.25,51.25" fill="none" stroke="#fcfbf9" stroke-width="1.2" stroke-linecap="round" />
    <path d="M 100,25 L 112.5,42.5" fill="none" stroke="#fcfbf9" stroke-width="1.2" stroke-linecap="round" />
    <path d="M 112.5,25 L 118.75,33.75" fill="none" stroke="#fcfbf9" stroke-width="1.2" stroke-linecap="round" />
    
    <!-- Diagonals going down-left (parallel to right edge) -->
    <path d="M 112.5,25 L 93.75,51.25" fill="none" stroke="#fcfbf9" stroke-width="1.2" stroke-linecap="round" />
    <path d="M 100,25 L 87.5,42.5" fill="none" stroke="#fcfbf9" stroke-width="1.2" stroke-linecap="round" />
    <path d="M 87.5,25 L 81.25,33.75" fill="none" stroke="#fcfbf9" stroke-width="1.2" stroke-linecap="round" />
    
    <!-- Horizontal Grid Lines inside the triangle -->
    <line x1="81.25" y1="33.75" x2="118.75" y2="33.75" stroke="#fcfbf9" stroke-width="1.2" stroke-linecap="round" />
    <line x1="87.5" y1="42.5" x2="112.5" y2="42.5" stroke="#fcfbf9" stroke-width="1.2" stroke-linecap="round" />
    <line x1="93.75" y1="51.25" x2="106.25" y2="51.25" stroke="#fcfbf9" stroke-width="1.2" stroke-linecap="round" />
  </g>
  
  <!-- Wordmark "uvva" - Highly Stylized & Symmetric (∪ ∨ ∨ ∩) -->
  <g transform="translate(0, 10)">
    <!-- Letter 'u': Smooth parabola open at top -->
    <path d="M 46,85 A 11,11 0 0,0 68,85" fill="none" stroke="#fcfbf9" stroke-width="3" stroke-linecap="round" />
    
    <!-- Letter 'v': Sharp wedge open at top -->
    <path d="M 74,80 L 85,101 L 96,80" fill="none" stroke="#fcfbf9" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Letter 'v': Sharp wedge open at top -->
    <path d="M 104,80 L 115,101 L 126,80" fill="none" stroke="#fcfbf9" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Letter 'a': Smooth parabola open at bottom -->
    <path d="M 134,96 A 11,11 0 0,1 156,96" fill="none" stroke="#fcfbf9" stroke-width="3" stroke-linecap="round" />
  </g>
  
  <!-- Subtext: CEPAS DIAMANTINAS -->
  <text x="100" y="128" font-family="'Proxima Nova', 'Montserrat', sans-serif" font-size="8" font-weight="600" fill="#c5a880" letter-spacing="4.5" text-anchor="middle">CEPAS DIAMANTINAS</text>
</svg>
